<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="860" height="160" viewBox="0 0 860 160">
  <defs>
    <style>
      .name     { font-family: Georgia,'Times New Roman',serif; font-size: 54px; font-weight: 700; letter-spacing: -1.5px; fill: #24292f; }
