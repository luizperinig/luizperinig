<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020408"/>
      <stop offset="100%" style="stop-color:#060b12"/>
    </linearGradient>
    <style>
      @keyframes blink {
        0%, 100% { opacity: 0.8; }
        50% { opacity: 0; }
      }
      .cursor { animation: blink 1.2s step-end infinite; }
    </style>
  </defs>

  <!-- background -->
  <rect width="900" height="200" fill="url(#bg)"/>

  <!-- terminal top bar -->
  <rect x="0" y="0" width="900" height="34" fill="#0d1117"/>
  <rect x="0" y="33" width="900" height="1" fill="#1a2535"/>

  <!-- traffic lights -->
  <circle cx="24" cy="17" r="5.5" fill="#ff5f57"/>
  <circle cx="43" cy="17" r="5.5" fill="#ffbd2e"/>
  <circle cx="62" cy="17" r="5.5" fill="#28c840"/>

  <!-- tab title -->
  <text x="450" y="22" font-family="'SF Mono','Courier New',monospace" font-size="11" fill="#3d4f63" text-anchor="middle">luizperini — zsh — 120×40</text>

  <!-- line 1: prompt + whoami -->
  <text x="44" y="72" font-family="'SF Mono','Courier New',monospace" font-size="13" fill="#4f46e5">❯</text>
  <text x="62" y="72" font-family="'SF Mono','Courier New',monospace" font-size="13" fill="#475569">whoami</text>

  <!-- line 2: name output -->
  <text x="44" y="100" font-family="'SF Mono','Courier New',monospace" font-size="30" font-weight="700" fill="#f0f6fc" letter-spacing="-0.5">Luiz Perini</text>

  <!-- line 3: prompt + cat -->
  <text x="44" y="130" font-family="'SF Mono','Courier New',monospace" font-size="13" fill="#4f46e5">❯</text>
  <text x="62" y="130" font-family="'SF Mono','Courier New',monospace" font-size="13" fill="#475569">cat contact.txt</text>

  <!-- line 4: contact output -->
  <text x="44" y="155" font-family="'SF Mono','Courier New',monospace" font-size="12.5" fill="#64748b">Intern @ Hotmart  ·  Systems Eng. @ UFMG  ·  Belo Horizonte, MG</text>

  <!-- line 5: links -->
  <text x="44" y="178" font-family="'SF Mono','Courier New',monospace" font-size="12" fill="#4f46e5">→</text>
  <text x="62" y="178" font-family="'SF Mono','Courier New',monospace" font-size="12" fill="#334a65">linkedin.com/in/luiz-filipe-perini-giacomin</text>
  <text x="500" y="178" font-family="'SF Mono','Courier New',monospace" font-size="12" fill="#4f46e5">→</text>
  <text x="518" y="178" font-family="'SF Mono','Courier New',monospace" font-size="12" fill="#334a65">@luizperini</text>

  <!-- blinking cursor -->
  <rect class="cursor" x="44" y="185" width="7" height="2" fill="#4f46e5"/>
</svg>
